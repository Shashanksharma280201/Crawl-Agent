<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saved Content Collector — Headless</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <!-- Mobile top bar -->
  <header class="topbar">
    <button class="topbar-burger" id="nav-toggle" aria-label="Open menu">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
    <span class="topbar-title">Saved Collector</span>
  </header>
  <div class="scrim" id="nav-scrim" hidden></div>

  <!-- Collapsible sidebar: platforms + crawl controls -->
  <aside class="a-sidebar" id="sidebar" aria-label="Platforms">
    <div class="a-brand">
      <span class="logo-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </span>
      <span class="a-label brand-name">Saved Collector</span>
    </div>

    <nav class="a-nav">
      <button class="a-link active" id="nav-all">
        <span class="a-ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </span>
        <span class="a-label sb-name">All content</span>
        <span class="a-label sb-count" id="all-count"></span>
      </button>
      <div id="side-platforms"></div>
    </nav>

    <div class="a-foot">
      <div class="health" id="browser-health"><span class="dot"></span><span class="a-label" id="browser-text">checking…</span></div>
      <div class="a-label a-account" id="account-line"></div>
    </div>
  </aside>

  <main class="content">
    <header class="page-head">
      <div>
        <h1>Your saved content</h1>
        <p class="muted">Headless collection from a logged-in browser — pick a platform in the sidebar to crawl.</p>
      </div>
      <div class="head-actions">
        <button class="btn primary" id="summarize">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 7.4H22l-6 4.6 2.3 7.4-6.3-4.6L5.7 21 8 14 2 9.4h7.6z"/></svg>
          Summarize with AI
        </button>
      </div>
    </header>

    <section class="block">
      <div class="block-head results-head">
        <h2>Results <span class="badge" id="result-count">0</span></h2>
        <div class="result-controls">
          <div class="search">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="search" id="search" placeholder="Search title, author…" />
          </div>
        </div>
      </div>
      <div class="items" id="items"></div>
      <div class="empty" id="empty" hidden><p id="empty-text">No items yet — log in to a platform in the sidebar, then Crawl.</p></div>
    </section>
  </main>

  <div class="overlay" id="summary-overlay" hidden></div>
  <aside class="summary-panel" id="summary-panel" hidden>
    <div class="sp-head">
      <div class="sp-title"><strong>AI Summary</strong></div>
      <button class="icon-btn" id="sp-close">✕</button>
    </div>
    <p class="sp-scope" id="sp-scope"></p>
    <div class="sp-body" id="sp-body"></div>
  </aside>

  <div class="drawer" id="drawer" hidden>
    <div class="drawer-head">
      <span class="spinner" id="drawer-spinner"></span>
      <strong id="drawer-title">Crawling…</strong>
      <span class="drawer-status" id="drawer-status"></span>
      <button class="icon-btn" id="drawer-close">✕</button>
    </div>
    <pre class="log" id="drawer-log"></pre>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
